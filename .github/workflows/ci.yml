name: ci

on:
  push:
    paths-ignore:
    - 'doc/**'
    - 'img/**'
    - '*.md'
    - '*.txt'
  pull_request:

jobs:
  build:
    permissions:
      id-token: write
      contents: write
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Install .NET 10.0
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Build and Test (Debug)
      run: dotnet test src -c Debug

    - name: Self Build - Publish (main only)
      if: github.event_name == 'push'
      shell: bash
      run: |
        ./src/dotnet-releaser/bin/Debug/net10.0/dotnet-releaser run --github-token "${{secrets.GITHUB_TOKEN}}" src/dotnet-releaser.toml
